<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Admin Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, #dbe7ff 100%);
      color: #111827;
      min-height: 100vh;
    }

    .navbar {
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding: 18px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #3454f5;
      letter-spacing: -0.5px;
    }

    .nav-right {
      color: #374151;
      font-size: 14px;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 34px 28px 50px;
    }

    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .hero-head h1 {
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -1px;
      margin-bottom: 10px;
      color: #111827;
    }

    .hero-head p {
      color: #4b5563;
      font-size: 16px;
      line-height: 1.6;
      max-width: 720px;
    }

    .refresh-btn {
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: white;
      color: #3454f5;
      box-shadow: 0 10px 25px rgba(52, 84, 245, 0.15);
      transition: 0.2s ease;
      min-width: 170px;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    .stat-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    .panel {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 800;
      color: #111827;
    }

    .count-box {
      color: #3454f5;
      font-size: 14px;
      font-weight: 700;
      background: #eef4ff;
      border: 1px solid rgba(52, 84, 245, 0.12);
      padding: 10px 14px;
      border-radius: 999px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 18px;
      overflow: hidden;
    }

    thead th {
      text-align: left;
      padding: 16px 14px;
      font-size: 13px;
      color: #6b7280;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      background: rgba(255, 255, 255, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    tbody td {
      padding: 16px 14px;
      font-size: 14px;
      color: #1f2937;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(52, 84, 245, 0.04);
    }

    .map-link {
      display: inline-block;
      padding: 10px 13px;
      border-radius: 12px;
      background: white;
      color: #3454f5;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(52, 84, 245, 0.08);
      white-space: nowrap;
    }

    .map-link:hover {
      text-decoration: underline;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-download {
      background: #e9f7ee;
      color: #15803d;
    }

    .badge-reward {
      background: #fff6db;
      color: #b45309;
    }

    .badge-later {
      background: #eef4ff;
      color: #3454f5;
    }

    .badge-default {
      background: #f3f4f6;
      color: #4b5563;
    }

    .empty,
    .error {
      text-align: center;
      padding: 40px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.5);
      color: #4b5563;
      font-size: 16px;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 1100px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .navbar {
        padding: 16px 18px;
      }

      .logo {
        font-size: 24px;
      }

      .page {
        padding: 24px 16px 40px;
      }

      .hero-head h1 {
        font-size: 32px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .refresh-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Signal</div>
    <div class="nav-right">Admin overview and location insights</div>
  </div>

  <main class="page">
    <div class="hero-head">
      <div>
        <h1>Admin Dashboard</h1>
        <p>
          Review submitted locations, referral actions, and recent engagement
          from the promotional landing page.
        </p>
      </div>

      <button class="refresh-btn" onclick="loadLocations()">Refresh Data</button>
    </div>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Records</div>
        <div class="stat-value" id="totalRecords">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Latest Update</div>
        <div class="stat-value" id="lastUpdate" style="font-size:18px;">-</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Average Accuracy</div>
        <div class="stat-value" id="avgAccuracy" style="font-size:20px;">-</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="systemStatus" style="font-size:20px;">Online</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-top">
        <div class="panel-title">Submitted Locations</div>
        <div class="count-box" id="countBox">Loading records...</div>
      </div>

      <div class="table-wrap">
        <div id="tableContent">Loading...</div>
      </div>
    </section>
  </main>

  <script>
    function normalizeRecords(responseData) {
      if (Array.isArray(responseData)) {
        return responseData;
      }

      if (responseData && Array.isArray(responseData.data)) {
        return responseData.data;
      }

      return [];
    }

    function actionBadge(action) {
      if (action === "download") {
        return '<span class="badge badge-download">Download App</span>';
      }

      if (action === "reward") {
        return '<span class="badge badge-reward">Refer & Earn</span>';
      }

      if (action === "later") {
        return '<span class="badge badge-later">Not Now</span>';
      }

      return '<span class="badge badge-default">-</span>';
    }

    function calculateAverageAccuracy(records) {
      const withAccuracy = records.filter(
        item => typeof item.accuracy === "number" && !Number.isNaN(item.accuracy)
      );

      if (withAccuracy.length === 0) {
        return "-";
      }

      const total = withAccuracy.reduce((sum, item) => sum + item.accuracy, 0);
      return Math.round(total / withAccuracy.length) + " m";
    }

    async function loadLocations() {
      const tableContent = document.getElementById("tableContent");
      const totalRecords = document.getElementById("totalRecords");
      const lastUpdate = document.getElementById("lastUpdate");
      const avgAccuracy = document.getElementById("avgAccuracy");
      const countBox = document.getElementById("countBox");

      try {
        const response = await fetch("/locations");
        const raw = await response.json();
        const records = normalizeRecords(raw);

        totalRecords.innerText = records.length;
        lastUpdate.innerText = new Date().toLocaleTimeString();
        avgAccuracy.innerText = calculateAverageAccuracy(records);
        countBox.innerText = `Showing ${records.length} record(s)`;

        if (records.length === 0) {
          tableContent.innerHTML = `<div class="empty">No submitted locations found yet.</div>`;
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Accuracy</th>
                <th>Action</th>
                <th>Time</th>
                <th>Map</th>
              </tr>
            </thead>
            <tbody>
        `;

        records.forEach((item, index) => {
          html += `
            <tr>
              <td>${index + 1}</td>
              <td>${item.latitude ?? "-"}</td>
              <td>${item.longitude ?? "-"}</td>
              <td>${item.accuracy ? Math.round(item.accuracy) + " m" : "-"}</td>
              <td>${actionBadge(item.action)}</td>
              <td>${item.time || item.timestamp || "-"}</td>
              <td>
                <a class="map-link" href="https://maps.google.com/?q=${item.latitude},${item.longitude}" target="_blank">
                  Open Map
                </a>
              </td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        tableContent.innerHTML = html;
      } catch (error) {
        totalRecords.innerText = "0";
        avgAccuracy.innerText = "-";
        lastUpdate.innerText = new Date().toLocaleTimeString();
        countBox.innerText = "Failed to load records";
        tableContent.innerHTML = `<div class="error">Failed to load location data.</div>`;
      }
    }

    loadLocations();
  </script>
</body>
</html>
